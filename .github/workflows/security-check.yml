name: security-check

on:
  push:
  pull_request:

jobs:
  grep-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for obvious secrets
        run: |
          ! grep -RInE "sk-proj-|OPENAI_API_KEY=sk-|PASSWORD=.+|TOKEN=.+secret|toycreative|hmbserv|194\.87" . \
            --exclude-dir=.git \
            --exclude=".env.example" \
            --exclude="security-check.yml" \
            --exclude="security.md"
